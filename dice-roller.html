<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dice & Tables</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #242220;
    --border: #3a3530;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #e8e0d0;
    --text2: #9a9080;
    --danger: #c0392b;
    --success: #27ae60;
    --red: #e74c3c;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-btn {
    flex: 1;
    padding: 14px 8px 10px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }

  /* SCREENS */
  .screen {
    display: none;
    padding: 20px 16px 90px;
    min-height: 100vh;
  }
  .screen.active { display: block; }

  /* HEADER */
  .page-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* DICE SCREEN */
  .dice-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .die-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    padding: 14px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    position: relative;
  }

  .die-btn .die-icon { font-size: 26px; }
  .die-btn:active { transform: scale(0.94); }
  .die-btn.selected {
    border-color: var(--accent);
    background: #2a2518;
  }

  .die-count {
    position: absolute;
    top: 6px; right: 8px;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dice-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:active { opacity: 0.7; }

  /* RESULTS */
  .results-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    min-height: 120px;
  }

  .results-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .results-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .result-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-die-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'Cinzel', serif;
  }

  .result-value {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--accent2);
    font-weight: 700;
    line-height: 1;
  }

  .empty-state {
    color: var(--text2);
    font-style: italic;
    text-align: center;
    padding: 20px 0;
  }

  /* TABLES SCREEN */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--text2);
  }

  .btn-small {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }

  .folder-list { margin-bottom: 20px; }

  .folder-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .folder-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 10px;
  }

  .folder-icon { font-size: 18px; }

  .folder-name {
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 14px;
  }

  .folder-toggle {
    color: var(--text2);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .folder-toggle.open { transform: rotate(90deg); }

  .folder-contents {
    display: none;
    border-top: 1px solid var(--border);
    padding: 8px;
  }

  .folder-contents.open { display: block; }

  .table-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .table-item:hover { background: var(--surface2); }

  .table-name {
    flex: 1;
    font-size: 16px;
  }

  .table-count {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Cinzel', serif;
  }

  .table-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .icon-btn:hover { color: var(--text); }
  .icon-btn.danger:hover { color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    padding: 24px 20px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    animation: slideUp 0.25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--accent); }

  .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    resize: vertical;
    min-height: 160px;
    transition: border-color 0.2s;
  }

  .form-textarea:focus { border-color: var(--accent); }

  .form-hint {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-top: 4px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-cancel {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    padding: 14px;
    cursor: pointer;
  }

  .btn-confirm {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }

  /* TABLE ROLL SCREEN */
  .table-detail {
    display: none;
  }

  .table-detail.active { display: block; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 20px;
    padding: 0;
  }

  .table-roll-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .roll-result-text {
    font-size: 22px;
    color: var(--accent2);
    line-height: 1.4;
  }

  .roll-result-chain {
    font-size: 14px;
    color: var(--text2);
    font-style: italic;
  }

  .table-entries-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .entry-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    font-size: 15px;
  }

  .entry-row:last-child { border-bottom: none; }

  .entry-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text2);
    min-width: 24px;
  }

  .entry-text { flex: 1; }

  .entry-link {
    font-size: 12px;
    color: var(--accent);
    font-family: 'Cinzel', serif;
  }

  /* LINK SELECTOR */
  .link-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .form-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 20px;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    padding: 10px 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .folder-delete-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .no-tables {
    color: var(--text2);
    font-style: italic;
    font-size: 14px;
    padding: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- SCREEN: DICE -->
<div class="screen active" id="screen-dice">
  <div class="page-title">⚔ Dice Roller</div>

  <div class="dice-grid" id="dice-grid">
    <button class="die-btn" data-sides="4" onclick="selectDie(this)">
      <span class="die-icon">🔷</span>
      <span>d4</span>
    </button>
    <button class="die-btn" data-sides="6" onclick="selectDie(this)">
      <span class="die-icon">🎲</span>
      <span>d6</span>
    </button>
    <button class="die-btn" data-sides="8" onclick="selectDie(this)">
      <span class="die-icon">🔸</span>
      <span>d8</span>
    </button>
    <button class="die-btn" data-sides="10" onclick="selectDie(this)">
      <span class="die-icon">🔟</span>
      <span>d10</span>
    </button>
    <button class="die-btn" data-sides="12" onclick="selectDie(this)">
      <span class="die-icon">🔺</span>
      <span>d12</span>
    </button>
    <button class="die-btn" data-sides="20" onclick="selectDie(this)">
      <span class="die-icon">⭐</span>
      <span>d20</span>
    </button>
    <button class="die-btn" data-sides="100" onclick="selectDie(this)">
      <span class="die-icon">💯</span>
      <span>d100</span>
    </button>
  </div>

  <div class="dice-actions">
    <button class="btn-primary" onclick="rollDice()">ROLL</button>
    <button class="btn-secondary" onclick="clearDice()">Clear</button>
  </div>

  <div class="results-area">
    <div class="results-label">RESULTS</div>
    <div class="results-list" id="results-list">
      <div class="empty-state">Select dice above and tap Roll</div>
    </div>
  </div>
</div>

<!-- SCREEN: TABLES LIST -->
<div class="screen" id="screen-tables">
  <div class="page-title">📜 Tables</div>

  <div class="section-header">
    <span class="section-title">FOLDERS</span>
    <button class="btn-small" onclick="openNewFolderModal()">+ Folder</button>
  </div>

  <div class="folder-list" id="folder-list">
    <!-- rendered by JS -->
  </div>

  <button class="btn-primary" style="width:100%" onclick="openNewTableModal()">+ New Table</button>
</div>

<!-- SCREEN: TABLE DETAIL -->
<div class="screen" id="screen-table-detail">
  <button class="back-btn" onclick="showTablesList()">← Back</button>
  <div class="page-title" id="detail-title">Table Name</div>

  <div class="dice-actions">
    <button class="btn-primary" onclick="rollCurrentTable()">ROLL TABLE</button>
    <button class="btn-secondary" onclick="openEditTableModal()">Edit</button>
  </div>

  <div class="table-roll-result" id="table-roll-result">
    <div class="empty-state">Tap Roll Table to get a result</div>
  </div>

  <div class="section-header" style="margin-top:16px">
    <span class="section-title">ENTRIES (<span id="entry-count">0</span>)</span>
    <button class="btn-small" onclick="exportTable()">Export</button>
  </div>

  <div class="table-entries-list" id="table-entries-list">
    <!-- rendered by JS -->
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('dice', this)">
    <span class="icon">🎲</span>
    <span>Dice</span>
  </button>
  <button class="nav-btn" onclick="showScreen('tables', this)">
    <span class="icon">📜</span>
    <span>Tables</span>
  </button>
</nav>

<!-- MODAL: NEW FOLDER -->
<div class="modal-overlay" id="modal-folder">
  <div class="modal">
    <div class="modal-title">New Folder</div>
    <div class="form-group">
      <label class="form-label">FOLDER NAME</label>
      <input class="form-input" id="folder-name-input" placeholder="e.g. Mythic, Combat, NPCs" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-folder')">Cancel</button>
      <button class="btn-confirm" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<!-- MODAL: NEW / EDIT TABLE -->
<div class="modal-overlay" id="modal-table">
  <div class="modal">
    <div class="modal-title" id="table-modal-title">New Table</div>
    <div class="form-group">
      <label class="form-label">TABLE NAME</label>
      <input class="form-input" id="table-name-input" placeholder="e.g. Random Event" />
    </div>
    <div class="form-group">
      <label class="form-label">FOLDER</label>
      <select class="form-select" id="table-folder-select" style="width:100%">
        <option value="">— No Folder —</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ENTRIES (one per line)</label>
      <textarea class="form-textarea" id="table-entries-input" placeholder="Entry one&#10;Entry two&#10;Entry three"></textarea>
      <div class="form-hint">One item per line. Use [d6], [d20] etc. in entries to auto-roll.</div>
    </div>
    <div class="form-group">
      <label class="form-label">LINKED TABLE (optional — rolls after this one)</label>
      <select class="form-select" id="table-link-select" style="width:100%">
        <option value="">— None —</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-table')">Cancel</button>
      <button class="btn-confirm" id="table-modal-confirm" onclick="saveTable()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let selectedDice = {}; // { sides: count }
let data = loadData();
let currentTableId = null;
let editingTableId = null;

function loadData() {
  try {
    const raw = localStorage.getItem('diceTablesApp');
    return raw ? JSON.parse(raw) : { folders: [], tables: [] };
  } catch(e) {
    return { folders: [], tables: [] };
  }
}

function saveData() {
  localStorage.setItem('diceTablesApp', JSON.stringify(data));
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'tables') renderFolders();
}

function showTablesList() {
  document.getElementById('screen-table-detail').classList.remove('active');
  document.getElementById('screen-tables').classList.add('active');
  renderFolders();
}

function openTableDetail(tableId) {
  currentTableId = tableId;
  const table = data.tables.find(t => t.id === tableId);
  if (!table) return;
  document.getElementById('detail-title').textContent = table.name;
  document.getElementById('entry-count').textContent = table.entries.length;
  document.getElementById('screen-tables').classList.remove('active');
  document.getElementById('screen-table-detail').classList.add('active');
  document.getElementById('table-roll-result').innerHTML = '<div class="empty-state">Tap Roll Table to get a result</div>';
  renderTableEntries(table);
}

// ─── DICE LOGIC ───────────────────────────────────────────────────────────────
function selectDie(btn) {
  const sides = parseInt(btn.dataset.sides);
  if (!selectedDice[sides]) selectedDice[sides] = 0;
  selectedDice[sides]++;

  let countEl = btn.querySelector('.die-count');
  if (!countEl) {
    countEl = document.createElement('span');
    countEl.className = 'die-count';
    btn.appendChild(countEl);
  }
  countEl.textContent = selectedDice[sides];
  btn.classList.add('selected');
}

function clearDice() {
  selectedDice = {};
  document.querySelectorAll('.die-btn').forEach(btn => {
    btn.classList.remove('selected');
    const c = btn.querySelector('.die-count');
    if (c) c.remove();
  });
  document.getElementById('results-list').innerHTML = '<div class="empty-state">Select dice above and tap Roll</div>';
}

function rollDice() {
  const keys = Object.keys(selectedDice);
  if (keys.length === 0) { showToast('Select some dice first'); return; }

  const list = document.getElementById('results-list');
  list.innerHTML = '';

  keys.forEach(sides => {
    const count = selectedDice[sides];
    for (let i = 0; i < count; i++) {
      const roll = Math.floor(Math.random() * parseInt(sides)) + 1;
      const chip = document.createElement('div');
      chip.className = 'result-chip';
      chip.innerHTML = `<span class="result-die-label">d${sides}</span><span class="result-value">${roll}</span>`;
      list.appendChild(chip);
    }
  });
}

// ─── FOLDERS ─────────────────────────────────────────────────────────────────
function openNewFolderModal() {
  document.getElementById('folder-name-input').value = '';
  openModal('modal-folder');
}

function createFolder() {
  const name = document.getElementById('folder-name-input').value.trim();
  if (!name) { showToast('Enter a folder name'); return; }
  data.folders.push({ id: Date.now().toString(), name });
  saveData();
  closeModal('modal-folder');
  renderFolders();
  showToast('Folder created');
}

function deleteFolder(folderId) {
  if (!confirm('Delete this folder? Tables inside will move to No Folder.')) return;
  data.folders = data.folders.filter(f => f.id !== folderId);
  data.tables.forEach(t => { if (t.folderId === folderId) t.folderId = ''; });
  saveData();
  renderFolders();
}

function renderFolders() {
  const container = document.getElementById('folder-list');
  container.innerHTML = '';

  // No-folder tables
  const loose = data.tables.filter(t => !t.folderId);
  if (loose.length > 0 || data.folders.length === 0) {
    const section = makeFolderSection('', 'General', loose);
    container.appendChild(section);
  }

  data.folders.forEach(folder => {
    const tables = data.tables.filter(t => t.folderId === folder.id);
    const section = makeFolderSection(folder.id, folder.name, tables);
    container.appendChild(section);
  });
}

function makeFolderSection(folderId, folderName, tables) {
  const item = document.createElement('div');
  item.className = 'folder-item';

  const header = document.createElement('div');
  header.className = 'folder-header';
  header.innerHTML = `
    <span class="folder-icon">📁</span>
    <span class="folder-name">${folderName}</span>
    ${folderId ? `<button class="folder-delete-btn" onclick="deleteFolder('${folderId}');event.stopPropagation()">🗑</button>` : ''}
    <span class="folder-toggle">▶</span>
  `;

  const contents = document.createElement('div');
  contents.className = 'folder-contents';

  if (tables.length === 0) {
    contents.innerHTML = '<div class="no-tables">No tables yet</div>';
  } else {
    tables.forEach(table => {
      const row = document.createElement('div');
      row.className = 'table-item';
      row.innerHTML = `
        <span class="table-name">${table.name}</span>
        <span class="table-count">${table.entries.length} entries</span>
        <div class="table-actions">
          <button class="icon-btn danger" onclick="deleteTable('${table.id}');event.stopPropagation()">🗑</button>
        </div>
      `;
      row.addEventListener('click', () => openTableDetail(table.id));
      contents.appendChild(row);
    });
  }

  header.addEventListener('click', () => {
    const toggle = header.querySelector('.folder-toggle');
    contents.classList.toggle('open');
    toggle.classList.toggle('open');
  });

  // Open by default
  contents.classList.add('open');
  header.querySelector('.folder-toggle').classList.add('open');

  item.appendChild(header);
  item.appendChild(contents);
  return item;
}

// ─── TABLES ───────────────────────────────────────────────────────────────────
function openNewTableModal() {
  editingTableId = null;
  document.getElementById('table-modal-title').textContent = 'New Table';
  document.getElementById('table-modal-confirm').textContent = 'Create';
  document.getElementById('table-name-input').value = '';
  document.getElementById('table-entries-input').value = '';
  populateFolderSelect('');
  populateLinkSelect('');
  openModal('modal-table');
}

function openEditTableModal() {
  const table = data.tables.find(t => t.id === currentTableId);
  if (!table) return;
  editingTableId = currentTableId;
  document.getElementById('table-modal-title').textContent = 'Edit Table';
  document.getElementById('table-modal-confirm').textContent = 'Save';
  document.getElementById('table-name-input').value = table.name;
  document.getElementById('table-entries-input').value = table.entries.map(e => e.text + (e.link ? ` >>>${e.link}` : '')).join('\n');
  populateFolderSelect(table.folderId || '');
  populateLinkSelect(table.linkedTableId || '');
  openModal('modal-table');
}

function populateFolderSelect(selected) {
  const sel = document.getElementById('table-folder-select');
  sel.innerHTML = '<option value="">— No Folder —</option>';
  data.folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id;
    opt.textContent = f.name;
    if (f.id === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateLinkSelect(selected) {
  const sel = document.getElementById('table-link-select');
  sel.innerHTML = '<option value="">— None —</option>';
  data.tables.forEach(t => {
    if (t.id === editingTableId) return;
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    if (t.id === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveTable() {
  const name = document.getElementById('table-name-input').value.trim();
  if (!name) { showToast('Enter a table name'); return; }

  const rawEntries = document.getElementById('table-entries-input').value
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0);

  if (rawEntries.length === 0) { showToast('Add at least one entry'); return; }

  const entries = rawEntries.map(line => {
    // Support inline links: "Entry text >>>tableId"
    const parts = line.split('>>>');
    return { text: parts[0].trim(), link: parts[1] ? parts[1].trim() : null };
  });

  const folderId = document.getElementById('table-folder-select').value;
  const linkedTableId = document.getElementById('table-link-select').value;

  if (editingTableId) {
    const idx = data.tables.findIndex(t => t.id === editingTableId);
    data.tables[idx] = { ...data.tables[idx], name, entries, folderId, linkedTableId };
    currentTableId = editingTableId;
  } else {
    const newTable = { id: Date.now().toString(), name, entries, folderId, linkedTableId };
    data.tables.push(newTable);
    currentTableId = newTable.id;
  }

  saveData();
  closeModal('modal-table');
  showToast(editingTableId ? 'Table updated' : 'Table created');

  if (editingTableId) {
    openTableDetail(currentTableId);
  } else {
    renderFolders();
  }
}

function deleteTable(tableId) {
  if (!confirm('Delete this table?')) return;
  data.tables = data.tables.filter(t => t.id !== tableId);
  saveData();
  renderFolders();
  showToast('Table deleted');
}

function renderTableEntries(table) {
  const container = document.getElementById('table-entries-list');
  container.innerHTML = '';
  table.entries.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'entry-row';
    const linkedName = entry.link ? (data.tables.find(t => t.id === entry.link)?.name || '') : '';
    row.innerHTML = `
      <span class="entry-num">${i + 1}</span>
      <span class="entry-text">${entry.text}</span>
      ${linkedName ? `<span class="entry-link">→ ${linkedName}</span>` : ''}
    `;
    container.appendChild(row);
  });
}

function rollCurrentTable() {
  const table = data.tables.find(t => t.id === currentTableId);
  if (!table) return;
  rollTable(table, document.getElementById('table-roll-result'), []);
}

function rollTable(table, container, chain) {
  if (chain.length > 5) return; // prevent infinite loops

  const idx = Math.floor(Math.random() * table.entries.length);
  const entry = table.entries[idx];

  // Process inline dice rolls like [d6]
  let text = entry.text.replace(/\[d(\d+)\]/gi, (_, sides) => {
    return Math.floor(Math.random() * parseInt(sides)) + 1;
  });

  chain.push({ table: table.name, result: text, num: idx + 1 });

  let html = '';
  chain.forEach((c, i) => {
    html += `<div class="roll-result-text" style="${i > 0 ? 'font-size:17px;' : ''}">${c.result}</div>`;
    if (i > 0) html += `<div class="roll-result-chain">from ${c.table}</div>`;
  });

  container.innerHTML = html;

  // Follow link if set
  if (entry.link) {
    const linked = data.tables.find(t => t.id === entry.link);
    if (linked) {
      setTimeout(() => rollTable(linked, container, chain), 300);
    }
  } else if (table.linkedTableId) {
    const linked = data.tables.find(t => t.id === table.linkedTableId);
    if (linked) {
      setTimeout(() => rollTable(linked, container, chain), 300);
    }
  }
}

function exportTable() {
  const table = data.tables.find(t => t.id === currentTableId);
  if (!table) return;
  const text = table.entries.map(e => e.text).join('\n');
  // Copy to clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  } else {
    // Fallback: show in prompt
    prompt('Copy your table entries:', text);
  }
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay tap
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderFolders();
</script>
</body>
</html>
